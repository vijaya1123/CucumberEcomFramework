version: 2.1

executors:
  java_executor:
    docker:
      - image: cimg/openjdk:17.0  # CircleCI's official OpenJDK 17 image
    working_directory: ~/project

jobs:
  build-and-test:
    executor: java_executor
    steps:
      - checkout  # Pulls your code from the repo

      # Restore Maven cache to speed up builds
      - restore_cache:
          keys:
            - maven-deps-{{ checksum "pom.xml" }}
            - maven-deps-

      # Download dependencies
      - run:
          name: Install dependencies
          command: mvn dependency:go-offline --batch-mode

      # Save Maven cache
      - save_cache:
          paths:
            - ~/.m2
          key: maven-deps-{{ checksum "pom.xml" }}

      # Run Cucumber tests
      - run:
          name: Run Cucumber Tests
          command: mvn clean test

      # Store test results for CircleCI test summary
      - store_test_results:
          path: target/surefire-reports

      # Store HTML reports (if using Cucumber HTML plugin)
      - store_artifacts:
          path: target/cucumber-reports
          destination: cucumber-reports

workflows:
  version: 2
  build_and_test_workflow:
    jobs:
      - build-and-test
